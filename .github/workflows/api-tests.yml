name: API Tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test-dev:
    name: Run DEV API Tests
    runs-on: ubuntu-latest

    services:
      api:
        image: ghcr.io/danielsilva-loanpro/sdet-interview-challenge:latest
        ports:
          - 3000:3000

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Run DEV tests
        run: npm run test:dev
        env:
          BASE_URL: http://127.0.0.1:3000
          AUTH_TOKEN: mysecrettoken

      - name: Upload DEV report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-dev
          path: playwright-report/

  test-prod:
    name: Run PROD API Tests
    runs-on: ubuntu-latest

    services:
      api:
        image: ghcr.io/danielsilva-loanpro/sdet-interview-challenge:latest
        ports:
          - 3000:3000

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Run PROD tests
        run: npm run test:prod
        env:
          BASE_URL: http://127.0.0.1:3000
          AUTH_TOKEN: mysecrettoken

      - name: Upload PROD report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-prod
          path: playwright-report/
